server {
    listen 80;
    server_name _;  # Accept any hostname (or replace with your domain)

    # Increase timeouts for long-running requests (SageMaker async inference can take time)
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    # Increase body size for image uploads
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        
        # WebSocket support (Gradio uses WebSockets for real-time updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for real-time updates
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

